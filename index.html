<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Showcase</title>

<style>
    :root {
        --bg: #111;
        --text: #fff;
        --card: #1c1c1c;
    }

    body.light {
        --bg: #f5f5f5;
        --text: #111;
        --card: #ffffff;
    }

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        transition: 0.4s;
    }

    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        background: #000;
    }

    header h1 {
        margin: 0;
        font-size: 24px;
    }

    .toggle-btn {
        cursor: pointer;
        padding: 8px 12px;
        border: none;
        background: red;
        color: white;
        border-radius: 5px;
    }

    .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        padding: 20px;
    }

    .card {
        background: var(--card);
        border-radius: 10px;
        overflow: hidden;
        transform: translateY(50px);
        opacity: 0;
        animation: fadeUp 0.8s forwards;
    }

    .card:nth-child(1) { animation-delay: 0.2s; }
    .card:nth-child(2) { animation-delay: 0.4s; }
    .card:nth-child(3) { animation-delay: 0.6s; }
    .card:nth-child(4) { animation-delay: 0.8s; }

    @keyframes fadeUp {
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }

    .card:hover {
        transform: scale(1.05);
        transition: 0.3s;
    }

    .card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        transition: 0.4s;
    }

    .card:hover img {
        transform: scale(1.1);
    }

    .card-content {
        padding: 15px;
    }

    .card h2 {
        margin: 0;
    }

    .card p {
        font-size: 14px;
        opacity: 0.8;
    }

    .btn {
        display: inline-block;
        margin-top: 10px;
        padding: 8px 12px;
        background: red;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        transition: 0.3s;
    }

    .btn:hover {
        background: darkred;
    }
</style>
</head>

<body>

<header>
    <h1>🚗 Car Showcase</h1>
    <button class="toggle-btn" onclick="toggleMode()">Toggle Mode</button>
</header>

<div class="container">

    <div class="card">
        <img src="https://source.unsplash.com/400x300/?lamborghini" alt="">
        <div class="card-content">
            <h2>Lamborghini</h2>
            <p>Extreme performance with aggressive design.</p>
            <a href="#" class="btn">View More</a>
        </div>
    </div>

    <div class="card">
        <img src="https://source.unsplash.com/400x300/?ferrari" alt="">
        <div class="card-content">
            <h2>Ferrari</h2>
            <p>Iconic Italian supercar built for speed.</p>
            <a href="#" class="btn">View More</a>
        </div>
    </div>

    <div class="card">
        <img src="https://source.unsplash.com/400x300/?bmw" alt="">
        <div class="card-content">
            <h2>BMW</h2>
            <p>Luxury and performance combined perfectly.</p>
            <a href="#" class="btn">View More</a>
        </div>
    </div>

    <div class="card">
        <img src="https://source.unsplash.com/400x300/?audi" alt="">
        <div class="card-content">
            <h2>Audi</h2>
            <p>Advanced tech with premium comfort.</p>
            <a href="#" class="btn">View More</a>
        </div>
    </div>

</div>

<script>
    function toggleMode() {
        document.body.classList.toggle("light");
    }
</script>

</body>
</html>
